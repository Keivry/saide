name: Reusable Build

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      runner:
        required: true
        type: string
      binary_name:
        required: true
        type: string
      extra_runtime_lib_dirs:
        required: false
        type: string
        default: ""
    outputs:
      scrcpy-server-jar-path:
        description: "Path to built scrcpy-server JAR"
        value: ${{ jobs.build.outputs.scrcpy-server-jar-path }}

env:
  CARGO_TERM_COLOR: always
  FFMPEG_PREFIX: /opt/ffmpeg8
  FFMPEG_VERSION: "8.1"

jobs:
  build:
    name: Build ${{ inputs.target }}
    runs-on: ${{ inputs.runner }}
    outputs:
      scrcpy-server-jar-path: ${{ steps.build-scrcpy.outputs.jar-path }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ inputs.target }}

      - name: Set up Java 17
        if: inputs.target == 'x86_64-unknown-linux-gnu'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        if: inputs.target == 'x86_64-unknown-linux-gnu'
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false
          packages: tools platform-tools platforms;android-36

      - name: Set up Gradle
        if: inputs.target == 'x86_64-unknown-linux-gnu'
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.14'

      - name: Build scrcpy-server
        id: build-scrcpy
        if: inputs.target == 'x86_64-unknown-linux-gnu'
        working-directory: scrcpy-server
        run: |
          set -euo pipefail
          gradle assembleRelease --no-daemon --console=plain 2>&1
          BUILT_JAR="build/outputs/apk/release/scrcpy-server-release-unsigned.apk"
          if [ ! -f "$BUILT_JAR" ]; then
            echo "ERROR: scrcpy-server jar not found at $BUILT_JAR" >&2
            exit 1
          fi
          echo "jar-path=$(realpath "$BUILT_JAR")" >> "$GITHUB_OUTPUT"
          echo "Built scrcpy-server v3.3.4 from source"

      - name: Install Ubuntu build dependencies
        if: inputs.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl \
            libasound2-dev libdrm-dev libfontconfig1-dev libfreetype6-dev \
            libopus-dev libssl-dev libva-dev libvdpau-dev libvulkan-dev \
            libwayland-dev libx11-dev libxcb1-dev libxcb-shm0-dev \
            libxcb-xfixes0-dev libxcursor-dev libxi-dev libxkbcommon-dev \
            libxrandr-dev nasm patchelf perl pkg-config tar xz-utils yasm

      - name: Build FFmpeg 8 from source
        if: inputs.target == 'x86_64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          curl -L "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz" -o "/tmp/ffmpeg-${FFMPEG_VERSION}.tar.xz"
          rm -rf "/tmp/ffmpeg-${FFMPEG_VERSION}"
          tar -xf "/tmp/ffmpeg-${FFMPEG_VERSION}.tar.xz" -C /tmp
          cd "/tmp/ffmpeg-${FFMPEG_VERSION}"
          ./configure --prefix="$FFMPEG_PREFIX" --enable-gpl --enable-pic \
            --enable-shared --disable-static --disable-programs --disable-doc --disable-debug
          make -j"$(getconf _NPROCESSORS_ONLN)"
          sudo make install
          printf 'PKG_CONFIG_PATH=%s/lib/pkgconfig\n' "$FFMPEG_PREFIX" >> "$GITHUB_ENV"

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        env:
          LD_LIBRARY_PATH: ${{ inputs.extra_runtime_lib_dirs }}
        run: cargo build --release --target ${{ inputs.target }}

      - name: Verify binary
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            dir "target/${{ inputs.target }}/release/${{ inputs.binary_name }}"
          else
            file "target/${{ inputs.target }}/release/${{ inputs.binary_name }}"
          fi
