timeout = 5

[scrcpy.v4l2]
device = "/dev/video0"
capture_orientation = 90
buffer = 0

[scrcpy.video]
bit_rate = "24M"
max_fps = 60
max_size = 1280
codec = "h264"
encoder = "c2.mtk.avc.encoder"

[scrcpy.options]
turn_screen_off = true
stay_awake = true

[gpu]
vsync = true
backend = "VULKAN"

[mappings.keyboard]
toggle = "KEY_SCROLLLOCK"
initial_state = true
show_notification = true

[[mappings.keyboard.profiles]]
name = "问道手游"
