[package]
name = "saide"
description = "Scrcpy companion app with key/mouse mapping"
version = "0.1.0"
edition = "2024"


[dependencies]
eframe = { version = "0.33", features = ["wgpu"] }
egui = { version = "0.33", features = ["serde"] }
wgpu = "27"

crossbeam-channel = "0.5"

v4l = "0.14"

anyhow = "1.0"
toml = "0.9"
serde = { version = "1.0", features = ["derive"] }

# bytemuck for uniform buffer casting
bytemuck = "1"

once_cell = "1"

libc = "0.2"
nix = { version = "0.30", features = ["process", "signal"] }

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
parking_lot = "0.12.5"

[profile.dev]
opt-level = 0


[profile.release]
opt-level = 3
codegen-units = 1
lto = true
strip = true
panic = "abort"
