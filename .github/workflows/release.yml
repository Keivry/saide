name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      tag_exists: ${{ steps.meta.outputs.tag_exists }}
      release_commit: ${{ steps.release.outputs.release_commit }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9].* ]]; then
            printf 'Release tag must match v*: %s\n' "$tag" >&2
            exit 1
          fi
          printf 'release_tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            printf 'tag_exists=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'tag_exists=false\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Check out existing release tag
        if: github.event_name == 'workflow_dispatch' && steps.meta.outputs.tag_exists == 'true'
        run: git checkout "refs/tags/${{ steps.meta.outputs.release_tag }}"

      - name: Create local tag for changelog generation
        if: github.event_name == 'workflow_dispatch' && steps.meta.outputs.tag_exists == 'false'
        run: git tag "${{ steps.meta.outputs.release_tag }}" "$GITHUB_SHA"

      - name: Resolve release commit
        id: release
        run: printf 'release_commit=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --tag ${{ steps.meta.outputs.release_tag }} --strip all

      - name: Persist generated changelog
        run: cp "${{ steps.cliff.outputs.changelog }}" release-notes.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md

  build-linux:
    name: Build + Package Linux
    needs: changelog
    uses: ./.github/workflows/_build.yml
    with:
      target: x86_64-unknown-linux-gnu
      runner: ubuntu-latest
      binary_name: saide
      extra_runtime_lib_dirs: /opt/ffmpeg8/lib
      package: true
      archive_basename: saide-${{ needs.changelog.outputs.release_tag }}-linux-glibc-x64
      package_dir_name: saide-${{ needs.changelog.outputs.release_tag }}-linux-glibc-x64
      archive_format: tar.gz
      artifact_name: linux-glibc-x64

  build-windows:
    name: Build + Package Windows
    needs: changelog
    uses: ./.github/workflows/_build.yml
    with:
      target: x86_64-pc-windows-msvc
      runner: windows-latest
      binary_name: saide.exe
      package: true
      archive_basename: saide-${{ needs.changelog.outputs.release_tag }}-windows-x64
      package_dir_name: saide-${{ needs.changelog.outputs.release_tag }}-windows-x64
      archive_format: zip
      artifact_name: windows-x64

  publish:
    name: Publish GitHub release
    needs:
      - changelog
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name 'release-notes.md' \) -exec cp {} release-assets/ \;
          find artifacts -type f -name 'scrcpy-server-v*' -exec cp {} release-assets/ \;

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changelog.outputs.release_tag }}
          target_commitish: ${{ needs.changelog.outputs.release_commit }}
          body_path: release-assets/release-notes.md
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz
            release-assets/scrcpy-server-v*
            release-assets/release-notes.md
          draft: false
          prerelease: false
