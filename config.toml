[general]
keyboard_enabled = true
mouse_enabled = true
init_timeout = 15
indicator = true
indicator_position = "bottom-left"

[scrcpy.video]
bit_rate = "24M"
max_fps = 120
max_size = 1600
codec = "h264"

[scrcpy.audio]
enabled = true
codec = "opus"
source = "playback"
# Audio buffer size in frames (lower = less latency, higher = more stable)
# Values: 64 (1.33ms), 128 (2.67ms), 256 (5.33ms) at 48kHz
buffer_frames = 64
# Ring buffer capacity in samples (higher = more buffering, less glitches)
ring_capacity = 5760

[scrcpy.options]
turn_screen_off = true
stay_awake = true

[gpu]
vsync = false
backend = "VULKAN"
# Enable hardware decoding (VAAPI/NVDEC)
# true: auto-detect and use hardware decoder (default)
# false: force software decoder
hwdecode = true

[input]
# Long press duration in milliseconds (default: 300ms)
long_press_ms = 300
# Drag detection threshold in pixels (default: 5.0px)
drag_threshold_px = 5.0
# Drag update interval in milliseconds (default: 8ms ≈ 120fps)
drag_interval_ms = 8

[mappings]
toggle = "F10"
initial_state = true
show_notification = true

