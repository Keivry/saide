name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  build-linux:
    name: Build Linux (glibc x64)
    runs-on: ubuntu-latest
    needs: fmt
    env:
      FFMPEG_PREFIX: /opt/ffmpeg8
      FFMPEG_VERSION: "8.1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
          components: clippy

      - name: Set up Java 17 for scrcpy-server build
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false
          packages: tools platform-tools platforms;android-36

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Build scrcpy-server from source
        working-directory: scrcpy-server
        run: |
          set -euo pipefail
          gradle assembleRelease --no-daemon --console=plain 2>&1
          BUILT_JAR="build/outputs/apk/release/scrcpy-server-release-unsigned.apk"
          if [ ! -f "$BUILT_JAR" ]; then
            echo "ERROR: scrcpy-server jar not found at $BUILT_JAR" >&2
            exit 1
          fi
          echo "Built scrcpy-server v3.3.4 from source"

      - name: Install Ubuntu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libasound2-dev \
            libdrm-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libopus-dev \
            libssl-dev \
            libva-dev \
            libvdpau-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            nasm \
            patchelf \
            perl \
            pkg-config \
            tar \
            xz-utils \
            yasm

      - name: Build FFmpeg 8 from source
        run: |
          set -euo pipefail
          curl -L "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz" -o "/tmp/ffmpeg-${FFMPEG_VERSION}.tar.xz"
          rm -rf "/tmp/ffmpeg-${FFMPEG_VERSION}"
          tar -xf "/tmp/ffmpeg-${FFMPEG_VERSION}.tar.xz" -C /tmp
          cd "/tmp/ffmpeg-${FFMPEG_VERSION}"
          ./configure \
            --prefix="$FFMPEG_PREFIX" \
            --enable-gpl \
            --enable-pic \
            --enable-shared \
            --disable-static \
            --disable-programs \
            --disable-doc \
            --disable-debug
          make -j"$(getconf _NPROCESSORS_ONLN)"
          sudo make install
          printf 'PKG_CONFIG_PATH=%s/lib/pkgconfig\n' "$FFMPEG_PREFIX" >> "$GITHUB_ENV"

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check compilation
        run: cargo check --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        env:
          LD_LIBRARY_PATH: /opt/ffmpeg8/lib
        run: cargo test --workspace -- --skip test_audio_player_creation --skip recorder_writes_audio_stream_to_mp4 --skip test_detect_gpu_linux

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Verify binary
        run: |
          file target/x86_64-unknown-linux-gnu/release/saide
          ldd target/x86_64-unknown-linux-gnu/release/saide || true

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    needs: fmt
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_TRIPLET=x64-windows-release" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_TARGET_TRIPLET=x64-windows-release" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_OVERLAY_TRIPLETS=$env:GITHUB_WORKSPACE\.github\vcpkg-triplets" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Windows pkg-config fallback
        run: |
          choco install -y pkgconfiglite
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install CUDA toolkit
        uses: MZWNET/cuda-toolkit@master
        with:
          cuda: "13.2.0"
          method: network

      - name: Install Windows build dependencies
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --overlay-triplets "$env:GITHUB_WORKSPACE\.github\vcpkg-triplets" "ffmpeg[nvcodec]:x64-windows-release" "opus:x64-windows-release"
          "VCPKG_INSTALLED_DIR=$env:VCPKG_ROOT\installed\x64-windows-release" | Out-File -FilePath $env:GITHUB_ENV -Append
          "FFMPEG_DIR=$env:VCPKG_ROOT\installed\x64-windows-release" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PKG_CONFIG_PATH=$env:VCPKG_ROOT\installed\x64-windows-release\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$env:VCPKG_ROOT\installed\x64-windows-release\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          if ($env:CUDA_PATH) {
            "CUDA_PATH=$env:CUDA_PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify binary
        run: |
          dir target\x86_64-pc-windows-msvc\release\saide.exe
