[general]
keyboard_enabled = true
mouse_enabled = true
auto_hide_toolbar = false
init_timeout = 15
indicator = true
indicator_position = "bottom-left"
# Intelligent window resizing: automatically scales down when video exceeds screen bounds
# true: uses preset resolution tiers to fit window within screen (recommended for GNOME/Wayland)
# false: uses video native resolution (may be constrained by window manager)
smart_window_resize = true

[scrcpy.video]
bit_rate = "24M"
min_fps = 5
max_fps = 120
max_size = 1600
codec = "h264"
# Lock video capture orientation (prevents auto-rotation with device)
# None (default): video follows device rotation
# Some(0): locked to portrait 0°
# Some(1): locked to landscape 90°CCW (left)
# Some(2): locked to portrait 180° (upside-down)
# Some(3): locked to landscape 270°CCW (right)
# When set, video rotation automatically compensates for device orientation changes
# capture_orientation = 0

[scrcpy.audio]
enabled = true
codec = "opus"
source = "playback"
# Audio buffer size in frames (lower = less latency, higher = more stable)
# Values: 64 (1.33ms), 128 (2.67ms), 256 (5.33ms) at 48kHz
buffer_frames = 64
# Ring buffer capacity in samples (higher = more buffering, less glitches)
ring_capacity = 5760

[scrcpy.options]
turn_screen_off = true
stay_awake = true

[gpu]
vsync = false
backend = "VULKAN"
# Enable hardware decoding (VAAPI/NVDEC)
# true: auto-detect and use hardware decoder (default)
# false: force software decoder
hwdecode = true

[input]
# Long press duration in milliseconds (default: 300ms)
long_press_ms = 300
# Drag detection threshold in pixels (default: 5.0px)
drag_threshold_px = 5.0
# Drag update interval in milliseconds (default: 8ms ≈ 120fps)
drag_interval_ms = 8

[mappings]
toggle = "F10"
initial_state = true
show_notification = true

[[mappings.profiles]]
name = "Default"
device_serial = "XXXXXXXXXXXX"
rotation = 1

[[mappings.profiles.mappings]]
key = "S"
action = "Tap"
x = 0.9275
y = 0.654

[[mappings.profiles.mappings]]
key = "A"
action = "Tap"
x = 0.9271
y = 0.9167

[logging]
level = "info"
